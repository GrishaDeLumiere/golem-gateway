<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/x-icon">
  <title>AI Core | Успешно</title>
  <link rel="stylesheet" href="/success.css">
  <style>
    /* ВАЖНО: Не разделяй фигурные скобки! */
    :root {
      --accent-color: {{COLOR}};
    }
  </style>
</head>

<body>
  <canvas id="particles-canvas" style="position:fixed;inset:0;z-index:-1;pointer-events:none;"></canvas>

  <div class="success-card">
    <div class="icon-wrapper">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
    </div>
    <h2>{{TITLE}}</h2>
    <p id="desc">{{MESSAGE}}</p>

    <div class="loader-line">
      <div class="loader-progress"></div>
    </div>
  </div>

  <script src="/ambient-particles.js"></script>
  <script>
    try {
      if (window.opener && !window.opener.closed && typeof window.opener.refreshDashboardCards === 'function') {
        window.opener.refreshDashboardCards();
      }
    } catch (e) {}
    setTimeout(() => {
      window.close();
      document.querySelector('.loader-line').style.display = 'none';
      document.getElementById('desc').innerHTML = 'Данные успешно сохранены в Ядре.<br>Можете закрыть эту вкладку и вернуться к Дашборду.';
      document.querySelector('.icon-wrapper').style.animation = 'none';
    }, 5000);
  </script>
</body>

</html>
