<!-- Модальное окно авторизации -->
<div class="modal-overlay" id="authModal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="modalTitle">
        <span id="modalIcon" style="display:flex; align-items:center; width:32px;"></span>
        <span id="modalTitleText"></span>
      </h2>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>

    <div class="step"><span class="step-num">1</span> <span data-i18n="auth_step_1">Скопируй этот скрипт захвата:</span></div>
    <div class="code-box">
      <code id="modalCode"></code>
      <button class="copy-btn" onclick="copySnippet()" title="Копировать">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
      </button>
    </div>

    <div class="step"><span class="step-num">2</span> <span data-i18n="auth_step_2">Нажми на кнопку ниже, чтобы открыть чат.</span></div>
    <div class="step"><span class="step-num">3</span> <span data-i18n="auth_step_3">Нажми <b>F12</b>, открой <b>Консоль (Console)</b>, вставь код (Ctrl+V) и нажми <b>Enter</b>.</span></div>

    <button id="modalActionBtn" class="btn" style="margin-top: 32px; font-size: 16px; padding: 14px;"></button>
  </div>
</div>
