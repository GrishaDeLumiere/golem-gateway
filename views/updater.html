<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI Core | Установка обновления</title>
    <link rel="icon" href="/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="/dashboard.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }
        .updater-modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 650px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            animation: fadeIn 0.4s ease-out;
        }
        .updater-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 16px;
        }
        .updater-header h2 {
            margin: 0;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }
        .status-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .log-container {
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            height: 280px;
            overflow-y: auto;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #a6e22e; /* Цвет текста как в code-box */
        }
        .log-container::-webkit-scrollbar { width: 8px; }
        .log-container::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .log-line { margin: 0 0 6px 0; animation: fadeIn 0.3s ease-in; }
        .log-line.error { color: #ef4444; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="updater-modal">
        <div class="updater-header">
            <h2>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent);">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Установка обновления ядра
            </h2>
            <div class="status-box">
                <span id="statusText" style="font-size: 14px; color: var(--text-muted);">Выполняется</span>
                <div class="pulse-dot auth" id="pulseIndicator" style="--pulse-color: 97,92,237; background: var(--accent);"></div>
            </div>
        </div>

        <div class="log-container" id="logs">
            <p class="log-line">> Инициализация протокола установки...</p>
        </div>

        <button class="btn btn-secondary" style="width: 100%; display: none;" id="closeBtn" onclick="window.close()">Закрыть окно</button>
    </div>

    <script>
        const logsEl = document.getElementById('logs');
        const statusText = document.getElementById('statusText');
        const pulseIndicator = document.getElementById('pulseIndicator');
        const closeBtn = document.getElementById('closeBtn');

        function appendLog(text, isError = false) {
            const p = document.createElement('p');
            p.className = 'log-line' + (isError ? ' error' : '');
            p.innerText = '> ' + text;
            logsEl.appendChild(p);
            logsEl.scrollTop = logsEl.scrollHeight; // Автоскролл
        }

        const evtSource = new EventSource("/api/update-stream");

        evtSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            if (data.message) {
                appendLog(data.message);
            } 
            else if (data.error) {
                appendLog("КРИТИЧЕСКАЯ ОШИБКА: " + data.error, true);
                statusText.innerText = 'Ошибка';
                statusText.style.color = 'var(--error)';
                pulseIndicator.className = 'pulse-dot no-auth';
                closeBtn.style.display = 'block';
                evtSource.close();
            }
            else if (data.done) {
                statusText.innerText = 'Завершено';
                statusText.style.color = 'var(--success)';
                pulseIndicator.className = 'pulse-dot auth';
                closeBtn.style.display = 'block';
                evtSource.close();
                
                appendLog("Вкладка может быть закрыта.");
            }
        };

        evtSource.onerror = function() {
            evtSource.close();
        };
    </script>
</body>
</html>
