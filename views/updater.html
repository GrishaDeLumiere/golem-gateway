<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>AI Core | Установка обновления</title>
  <link rel="icon" href="/favicon.svg" type="image/x-icon">
  <link rel="stylesheet" href="/dashboard.css">
  <link rel="stylesheet" href="/updater.css">
</head>

<body>
  <!-- Интеграция фоновых частиц -->
  <canvas id="particles-canvas" style="position:fixed;inset:0;z-index:1;pointer-events:none;"></canvas>

  <div class="updater-modal">
    <div class="updater-header">
      <h2>
        <div class="update-icon-wrapper" style="width: 44px; height: 44px; border-radius: 12px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--accent);">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </div>
        Установка обновления ядра
      </h2>
      <div class="status-box">
        <span id="statusText" style="font-size: 14px; font-weight: 500; color: var(--text-muted);">Выполняется</span>
        <div class="spinner-ring" id="pulseIndicator" style="width: 18px; height: 18px; border-width: 2px;"></div>
      </div>
    </div>

    <div class="log-container" id="logs">
      <!-- Логи будут генерироваться здесь -->
    </div>

    <button class="btn btn-update" style="width: 100%; justify-content: center; display: none; height: 46px;" id="closeBtn" onclick="window.location.href='/'">
      Вернуться в панель управления
      <div class="update-glow"></div>
    </button>
  </div>

  <script src="/ambient-particles.js" defer></script>
  <script>
    const logsEl = document.getElementById('logs');
    const statusText = document.getElementById('statusText');
    const pulseIndicator = document.getElementById('pulseIndicator');
    const closeBtn = document.getElementById('closeBtn');

    function getTimestamp() {
      const now = new Date();
      return now.toLocaleTimeString('ru-RU', {
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      }) + '.' + Math.floor(now.getMilliseconds() / 100).toString();
    }

    function appendLog(text, type = 'info') {
      const p = document.createElement('div');
      p.className = 'log-line ' + type;

      p.innerHTML = `
 <span class="log-time">[${getTimestamp()}]</span>
 <span class="log-msg">${text}</span>
 `;
      logsEl.appendChild(p);
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    appendLog("Запуск модуля прошивки шлюза...", "warn");

    const evtSource = new EventSource("/api/update-stream");

    evtSource.onmessage = function(event) {
      const data = JSON.parse(event.data);

      if (data.message) {
        appendLog(data.message, data.type || 'info');
      } else if (data.error) {
        appendLog(`СБОЙ: ${data.error}`, 'error');
        statusText.innerText = 'Прервано';
        statusText.style.color = 'var(--error)';
        pulseIndicator.className = 'pulse-dot no-auth';
        pulseIndicator.style.animation = 'none';
        closeBtn.style.display = 'flex';
        evtSource.close();
      } else if (data.done) {
        statusText.innerText = 'Завершено';
        statusText.style.color = 'var(--success)';
        pulseIndicator.className = 'pulse-dot auth';
        pulseIndicator.style.animation = 'none';
        closeBtn.style.display = 'flex';
        evtSource.close();
      }
    };

    evtSource.onerror = function() {
      evtSource.close();
    };
  </script>
</body>

</html>
